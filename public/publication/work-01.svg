<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">访谈透镜结果页校样</title>
  <desc id="desc">三条访谈主题和对应原文证据组成的编辑界面</desc>
  <rect width="1280" height="900" fill="#d7ef45"/>
  <rect x="70" y="60" width="1140" height="780" fill="#f8f3e9" stroke="#171713" stroke-width="4"/>
  <rect x="70" y="60" width="1140" height="80" fill="#171713"/>
  <text x="110" y="110" fill="#f8f3e9" font-family="serif" font-size="28" font-weight="700">访谈透镜</text>
  <text x="1125" y="110" fill="#d7ef45" font-family="monospace" font-size="18" text-anchor="end">3 THEMES / 12 NOTES</text>
  <text x="110" y="205" fill="#e63c27" font-family="monospace" font-size="18">01 / 最先出现的共性</text>
  <text x="110" y="250" fill="#171713" font-family="serif" font-size="38" font-weight="700">读者需要先确认依据，再接受总结</text>
  <line x1="110" y1="286" x2="1170" y2="286" stroke="#171713" stroke-width="2"/>
  <rect x="110" y="320" width="680" height="115" fill="#efe9dc"/>
  <rect x="820" y="320" width="350" height="115" fill="#315fd6"/>
  <text x="140" y="365" fill="#68645b" font-family="monospace" font-size="16">访谈证据 04</text>
  <text x="140" y="405" fill="#171713" font-family="serif" font-size="24">“我想知道这个结论是从哪句话来的。”</text>
  <text x="850" y="365" fill="#f8f3e9" font-family="monospace" font-size="16">ACTION</text>
  <text x="850" y="405" fill="#f8f3e9" font-family="serif" font-size="23">默认展开一条原文证据</text>
  <text x="110" y="515" fill="#e63c27" font-family="monospace" font-size="18">02 / 关键分歧</text>
  <line x1="110" y1="550" x2="1170" y2="550" stroke="#171713" stroke-width="2"/>
  <text x="110" y="610" fill="#171713" font-family="serif" font-size="30" font-weight="700">速度与可追溯性之间，需要一次明确取舍</text>
  <text x="110" y="690" fill="#68645b" font-family="serif" font-size="22">删除团队空间，把有限时间留给证据回看。</text>
  <rect x="110" y="740" width="1060" height="42" fill="#171713"/>
  <text x="130" y="768" fill="#d7ef45" font-family="monospace" font-size="16">V0.2 / EDITORIAL PROOF</text>
</svg>
